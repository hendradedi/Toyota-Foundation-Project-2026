name: Auto-Update Dashboard Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/admin-dashboard/**'
      - 'plans/**'
      - '*.md'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Update project data
        working-directory: frontend/project-dashboard
        run: |
          # Count files and calculate statistics
          echo "Updating project statistics..."
          
          # This script will be enhanced to automatically update projectData.ts
          # based on actual project files and git history
          
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add frontend/project-dashboard/src/data/projectData.ts
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update dashboard data [skip ci]" && git push)
