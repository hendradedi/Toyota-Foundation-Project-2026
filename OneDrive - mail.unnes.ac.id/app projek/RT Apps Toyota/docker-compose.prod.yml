version: '3.8'

services:
  # ============================================
  # Database Services
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: rt-muban-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-rt_muban_db}
      POSTGRES_USER: ${DB_USER:-rt_muban_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - rt-muban-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rt_muban_user} -d ${DB_NAME:-rt_muban_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rt-muban-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - rt-muban-prod-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API Gateway
  # ============================================
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: rt-muban-api-gateway
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-rt_muban_db}
      DB_USER: ${DB_USER:-rt_muban_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_long_random_string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_to_another_random_string}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rt-muban-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Frontend - Web App (Citizens)
  # ============================================
  web-app:
    build:
      context: ./frontend/web-app
      dockerfile: Dockerfile
    container_name: rt-muban-web-app
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_GATEWAY_URL: http://api-gateway:3000
    ports:
      - "3003:3003"
    depends_on:
      - api-gateway
    networks:
      - rt-muban-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Reverse Proxy (Nginx)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: rt-muban-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web-app
      - api-gateway
    networks:
      - rt-muban-prod-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  rt-muban-prod-network:
    driver: bridge
